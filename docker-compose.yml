version: '3.8'

services:
  # PHP Application (FPM)
  app:
    build:
      context: .
      target: production
    image: smart-ecom-app:latest
    container_name: smart-ecom-app
    restart: unless-stopped
    volumes:
      - app_code:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - CACHE_STORE=database
    depends_on:
      - db
      - minio

  # Nginx Web Server
  web:
    image: nginx:latest
    container_name: smart-ecom-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app_code:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Database Server (MySQL)
  db:
    image: mysql:8.0
    container_name: smart-ecom-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD=secret
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Queue Worker
  queue-worker:
    build:
      context: .
      target: production
    image: smart-ecom-app:latest
    container_name: smart-ecom-queue
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - app_code:/var/www/html
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
    depends_on:
      - app
      - db

  # Laravel Scheduler
  scheduler:
    build:
      context: .
      target: production
    image: smart-ecom-app:latest
    container_name: smart-ecom-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php /var/www/html/artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - app_code:/var/www/html
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
    depends_on:
      - app
      - db

  # MinIO Object Storage (S3-Compatible)
  minio:
    image: minio/minio:latest
    container_name: smart-ecom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9090:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: creates both dev and production buckets on first run
  minio-init:
    image: minio/mc:latest
    container_name: smart-ecom-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/$${MINIO_BUCKET_DEV:-smart-ecom-dev};
        mc anonymous set download local/$${MINIO_BUCKET_DEV:-smart-ecom-dev};
        mc mb --ignore-existing local/$${MINIO_BUCKET_PROD:-smart-ecom-production};
        mc anonymous set download local/$${MINIO_BUCKET_PROD:-smart-ecom-production};
        exit 0;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_DEV: ${MINIO_BUCKET_DEV:-smart-ecom-dev}
      MINIO_BUCKET_PROD: ${MINIO_BUCKET_PROD:-smart-ecom-production}

volumes:
  app_code:
  db_data:
  minio_data:
