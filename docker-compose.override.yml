version: '3.8'

services:
  app:
    build:
      context: .
      target: app-base
    volumes:
      - .:/var/www/html:cached
    ports:
      - "9000:9000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - REDIS_HOST=redis

  web:
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  queue-worker:
    build:
      context: .
      target: app-base
    volumes:
      - .:/var/www/html:cached
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - REDIS_HOST=redis

  scheduler:
    build:
      context: .
      target: app-base
    volumes:
      - .:/var/www/html:cached
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
